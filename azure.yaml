# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: va-loan-concierge
metadata:
    template: va-loan-concierge
services:
    rate-intelligence-agent:
        project: .
        host: azure.ai.agent
        language: python
        docker:
            path: ../Dockerfile
            context: ..
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.25"
                    memory: 0.5Gi
infra:
    provider: bicep
    path: infra
hooks:
    postprovision:
        name: postprovision
        kind: pwsh
        shell: pwsh
        run: infra/hooks/postprovision.ps1
